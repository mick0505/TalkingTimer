name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show commit + show MainActivity + search KeyboardOptions
        run: |
          echo "COMMIT SHA:"
          git rev-parse HEAD
          echo "LAST COMMIT:"
          git --no-pager log -1 --oneline
          echo "---- MainActivity.kt (first 160 lines) ----"
          sed -n '1,160p' app/src/main/java/com/example/talkingtimer/MainActivity.kt
          echo "---- grep KeyboardOptions ----"
          grep -RIn "KeyboardOptions" app/src/main/java || true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: TalkingTimer-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
